name: Supabase Keep Alive

on:
  schedule:
    # Esto le dice que se ejecute a las 00:00 UTC todos los días
    - cron: '0 0 * * *'
  # Esto te permite probarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send a request to Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/design_briefs?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
